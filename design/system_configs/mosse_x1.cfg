# mosse_x1.cfg — v++ linker configuration for MOSSE tracker (new architecture)
#
# PL kernels:
#   camera_capture : zero-fill DDR frame buffer (stub; TODO: replace with MIPI RX)
#   roi_crop       : extract PATCH_ROWS×PATCH_COLS patch → 128-bit AXIS → AIE PatchIn
#
# AIE graph:
#   mosse_graph: conv2d + FFT2D + cmul_accum + IFFT2D (single instances, serial)
#   All inter-stage data exchange via GMIO (DDR round-trips); APU drives GMIO in loop.
#
# PLIO connections (1 only):
#   roi_crop.patch_out → ai_engine_0.PatchIn
#
# GMIO ports are wired inside the ADF graph and driven by the APU host (mosse_tracker.cpp).
# They do NOT appear in stream_connect entries here.

[connectivity]
nk=camera_capture:1:camera_capture_0
nk=roi_crop:1:roi_crop_0

# PatchIn PLIO: roi_crop streams the extracted patch to the AIE conv2d kernel
stream_connect=roi_crop_0.patch_out:ai_engine_0.PatchIn

# DDR memory bank assignments
sp=camera_capture_0.gmem0:DDR[0]
sp=roi_crop_0.gmem0:DDR[0]

[advanced]
param=hw_emu.enableProfiling=false
# Set AIE core clock to 1 GHz via post_sys_link.tcl
param=compiler.userPostSysLinkOverlayTcl=../directives/post_sys_link.tcl
