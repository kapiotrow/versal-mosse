# mosse_x1.cfg — v++ linker configuration for 1-instance MOSSE tracker
#
# Stream connectivity (serial channel processing, N_CHANNELS=16 default):
#
#  fmt_adapter → [FFTRowIn{ch}] → AIE fft2d[ch].fft_rows
#  AIE fft2d[ch].fft_rows → [FFTRowOut{ch}] → cmul_accum (transpose fill)
#  cmul_accum (col-major re-stream) → [FFTColIn{ch}] → AIE fft2d[ch].fft_cols
#  AIE fft2d[ch].fft_cols → [FFTColOut{ch}] → cmul_accum (F_ch ⊙ H_ch* accumulate)
#  cmul_accum (accum flush) → [IFFTRowIn0] → AIE ifft2d.ifft_rows
#  AIE ifft2d.ifft_rows → [IFFTRowOut0] → cmul_accum (IFFT transpose fill)
#  cmul_accum (IFFT col re-stream) → [IFFTColIn0] → AIE ifft2d.ifft_cols
#  AIE ifft2d.ifft_cols → [IFFTColOut0] → peak_detect
#
# TODO: expand stream_connect for all N_CHANNELS channels once PLIO names
#       are confirmed from aiecompiler output. Shown below for ch=0 only.

[connectivity]
nk=conv_layer:1:conv_layer_0
nk=fmt_adapter:1:fmt_adapter_0
nk=cmul_accum:1:cmul_accum_0
nk=peak_detect:1:peak_detect_0

# Channel 0 wiring (replicate for ch=1..N_CHANNELS-1 with correct PLIO names)
stream_connect=fmt_adapter_0.fft_row_out:ai_engine_0.FFTRowIn0
stream_connect=ai_engine_0.FFTRowOut0:cmul_accum_0.fft_row_in

stream_connect=cmul_accum_0.fft_col_out:ai_engine_0.FFTColIn0
stream_connect=ai_engine_0.FFTColOut0:cmul_accum_0.fft_col_in

# IFFT wiring (single instance, driven after channel accumulation)
stream_connect=cmul_accum_0.ifft_row_out:ai_engine_0.IFFTRowIn0
stream_connect=ai_engine_0.IFFTRowOut0:cmul_accum_0.ifft_row_in

stream_connect=cmul_accum_0.ifft_col_out:ai_engine_0.IFFTColIn0
stream_connect=ai_engine_0.IFFTColOut0:peak_detect_0.resp_in

# DDR memory banks — assign as needed for bandwidth
# sp=conv_layer_0.gmem0:DDR[0]
# sp=fmt_adapter_0.gmem0:DDR[0]
# sp=cmul_accum_0.gmem0:DDR[1]    # transpose_buf
# sp=cmul_accum_0.gmem1:DDR[1]    # filter_buf
# sp=cmul_accum_0.gmem2:DDR[1]    # accum_buf

[advanced]
param=hw_emu.enableProfiling=false
# Set AIE core clock to 1 GHz via post_sys_link.tcl
param=compiler.userPostSysLinkOverlayTcl=../directives/post_sys_link.tcl
